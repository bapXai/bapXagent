<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Binary-inspired X Logo for bapX -->
  <!-- Background circle with binary pattern -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <pattern id="binaryPattern" x="0" y="0" width="10" height="10" patternUnits="userSpaceOnUse">
      <text x="1" y="8" font-family="monospace" font-size="6" fill="rgba(255,255,255,0.1)">01</text>
    </pattern>
  </defs>
  
  <!-- Main circle background -->
  <circle cx="50" cy="50" r="48" fill="url(#bgGradient)"/>
  
  <!-- Binary pattern overlay -->
  <circle cx="50" cy="50" r="48" fill="url(#binaryPattern)"/>
  
  <!-- X shape made of binary-inspired lines -->
  <g stroke="white" stroke-width="8" stroke-linecap="round">
    <!-- Top-left to bottom-right -->
    <line x1="28" y1="28" x2="72" y2="72">
      <animate attributeName="stroke-dasharray" values="0,100;100,0" dur="0.3s" fill="freeze"/>
    </line>
    <!-- Top-right to bottom-left -->
    <line x1="72" y1="28" x2="28" y2="72">
      <animate attributeName="stroke-dasharray" values="0,100;100,0" dur="0.3s" begin="0.15s" fill="freeze"/>
    </line>
  </g>
  
  <!-- Binary dots at intersections -->
  <circle cx="28" cy="28" r="3" fill="#fff"/>
  <circle cx="72" cy="28" r="3" fill="#fff"/>
  <circle cx="50" cy="50" r="4" fill="#fff"/>
  <circle cx="28" cy="72" r="3" fill="#fff"/>
  <circle cx="72" cy="72" r="3" fill="#fff"/>
  
  <!-- Subtle glow effect -->
  <circle cx="50" cy="50" r="48" stroke="rgba(255,255,255,0.2)" stroke-width="2" fill="none"/>
</svg>
